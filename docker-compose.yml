services:
  openlist-strm:
    image: ghcr.io/jinlin-teck/openlist-strm:latest
    # 如需本地构建，注释掉上面 image 行并取消下面 build 行注释
    # build: .
    container_name: openlist-strm
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai   # cron 定时按此时区执行
    volumes:
      # 配置文件（首次把 config.example.yaml 复制为 config.yaml 并修改）
      - ./config:/app/config
      # strm 输出目录：宿主机路径需与 config.yaml 中 tasks[].target_dir 一致
      - /opt/appdata/emby/strm:/opt/appdata/emby/strm
